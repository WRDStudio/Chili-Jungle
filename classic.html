<!DOCTYPE html>

<html class="dark h-full" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Jungle Studio - Player</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "on-error-container": "#ffdad6",

                        "on-tertiary": "#650b00",
                        "inverse-primary": "#904d00",
                        "on-secondary-fixed-variant": "#215034",
                        "primary-fixed": "#ffdcc3",
                        "secondary-fixed": "#bbefca",
                        "on-primary-fixed": "#2f1500",

                        "on-primary": "#4d2600",
                        "surface-container-low": "#1c1b1b",
                        "primary": "#d97706",
                        "surface-container-lowest": "#0e0e0e",
                        "outline-variant": "#564334",
                        "inverse-surface": "#e5e2e1",
                        "on-secondary-container": "#8fc09e",
                        "surface-tint": "#d97706",
                        "on-tertiary-fixed-variant": "#8c1803",
                        "inverse-on-surface": "#313030",
                        "on-secondary": "#04381f",
                        "error": "#ffb4ab",
                        "tertiary-fixed": "#ffdad3",
                        "error-container": "#93000a",
                        "surface": "#131313",
                        "background": "#131313",
                        "on-tertiary-fixed": "#3e0400",
                        "on-background": "#e5e2e1",
                        "on-tertiary-container": "#7e1100",
                        "tertiary-fixed-dim": "#ffb4a5",
                        "primary-container": "#d97706",
                        "on-surface-variant": "#f5f5f4",
                        "outline": "#a48c7a",
                        "on-error": "#690005",
                        "secondary-fixed-dim": "#a0d2ae",
                        "surface-container": "#201f1f",
                        "tertiary-container": "#ff8870",
                        "on-primary-container": "#fffaf0",
                        "surface-variant": "#353534",
                        "on-secondary-fixed": "#002110",
                        "secondary": "#a0d2ae",
                        "surface-dim": "#131313",
                        "surface-container-highest": "#353534",
                        "surface-container-high": "#2a2a2a",

                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"

                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"],
                        "archivo": ["Archivo Black"],
                        "serif": ["Fraunces"]

                }
            }
        }

<style>.material-symbols-outlined {
    font-variation-settings: "FILL" 0, "wght" 300, "GRAD" 0, "opsz" 24
    }
body {
    font-family: "Plus Jakarta Sans", sans-serif;
    background-color: #131313
    }
.editorial-text {
    font-family: "Archivo Black", sans-serif;
    letter-spacing: -0.02em
    }
.serif-text {
    font-family: "Fraunces", serif;
    font-style: italic
    }
.bg-vibrant-texture {
    background-color: #d97706;
    background-image: radial-gradient(circle at 20% 30%, rgba(255, 215, 0, 0.2) 0%, transparent 50%), radial-gradient(circle at 80% 70%, rgba(184, 134, 11, 0.3) 0%, transparent 50%), url(https://lh3.googleusercontent.com/aida-public/AB6AXuAo3TV7b_dPgBf-2vwG_OplEYqpsCf7xIPELqGtwrHd4wqoPPRq35b16F_1uGHa4R019dZAHYYgsk92Ui6H8ENOe-V3P0K91gRLFRO69OoAHnjUeUXa_YGC_nyBECCcTmZsSYd5Ve9kSOaZX2eSzQFn-3hp5UZvT1K40e6c-3-RZzBOnAIFkXDQQVYUgPoOsqsEpIxsfQEPxazxDIkK3A7WjGj36BQily1vn-RV8PC9QHeywcpb_0Pe48kzF9xkkfxNXIa9bTfJWBlW), conic-gradient(from 180deg at 50% 50%, #b45309, #d97706, #fbbf24, #d97706, #b45309);
    background-blend-mode: soft-light, overlay, multiply, normal
    }
.gold-text {
    color: #F5F5DC;
    text-shadow: 0 0 12px rgba(245, 245, 220, 0.25)
    }
.gold-icon {
    color: #F5F5DC
    }
.energy-overlay {
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    opacity: 0.07;
    mix-blend-mode: overlay
    }</style>
</head>
<body class="bg-background flex items-center justify-center p-6 h-full">
<!-- Compact Horizontal Player Card -->
<div class="w-full max-w-5xl bg-vibrant-texture rounded-[2rem] overflow-hidden shadow-[0_20px_50px_rgba(0,0,0,0.5)] flex flex-col md:flex-row items-center p-6 md:p-8 gap-8 relative border border-white/5">
<!-- Energy Texture Overlay -->
<div class="absolute inset-0 energy-overlay pointer-events-none"></div>
<!-- Cover Art (Left) -->
<div class="w-48 h-48 md:w-56 md:h-56 shrink-0 rounded-2xl overflow-hidden shadow-2xl z-10 border border-white/10">
<img class="w-full h-full object-cover" data-alt="Abstract vibrant sun illustration with burnt orange and mustard yellow swirling patterns" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCisGYONPJQT0EhXaKjGnOvMJkZnCFeXihpeOwsCQVAtZ_N_Gn8DNfRMn_t6MGVi6xsr0uKgcamhtkcsGUwbHB6nGAikdc1PPVEpB81po9se1Ou6IIUr_8ZPNuzR-S9DwJYibXpgOvKigoJucS1dT2efDhTi659NwWyhRERrr6SkEZzDDPEQhRwRifFuMq_l5gSjpwEX7qnMS0T1SvpgczJHoLWwG7xKpIenKZuGInSSQBWqt24Z0j_2q5uU5WVOnMdMeFGSwecYFPj"/>
</div>
<!-- Info and Controls (Right) -->
<div class="flex-1 w-full flex flex-col justify-center gap-6 z-10">
<!-- Metadata -->
<div class="flex flex-col md:flex-row md:items-end justify-between gap-2">
<div>
<h1 class="editorial-text text-3xl md:text-5xl uppercase leading-tight gold-text">Esencia del Sol</h1>
<p class="serif-text text-xl gold-text/90">by Jungle Studio Collective</p>
</div>
<div class="flex items-center gap-4 gold-icon">
<span class="material-symbols-outlined cursor-pointer hover:opacity-70 transition-opacity">favorite</span>
<span class="material-symbols-outlined cursor-pointer hover:opacity-70 transition-opacity">more_horiz</span>
</div>
</div>
<!-- Playback Core -->
<div class="space-y-4">
<!-- Progress Bar -->
<div class="space-y-2">
<div class="h-1.5 w-full bg-black/20 rounded-full overflow-hidden backdrop-blur-sm">
<div class="h-full w-2/3 relative rounded-full shadow-[0_0_8px_rgba(255,215,0,0.5)] bg-[#F5F5DC]" style="box-shadow: 0 0 8px rgba(245, 245, 220, 0.5);"></div>
</div>
<div class="flex justify-between text-[10px] font-bold tracking-widest uppercase gold-text">
<span>2:45</span>
<span>4:12</span>
</div>
</div>
<!-- Control Bar -->
<div class="flex items-center justify-between">
<div class="flex items-center gap-6">
<button class="hover:opacity-80 transition-opacity gold-icon">
<span class="material-symbols-outlined text-[24px]">shuffle</span>
</button>
<button class="hover:scale-110 transition-transform gold-icon">
<span class="material-symbols-outlined text-[32px]">skip_previous</span>
</button>
</div>
<button class="w-16 h-16 rounded-full bg-[#0e0e0e] gold-icon flex items-center justify-center shadow-2xl hover:scale-105 active:scale-95 transition-all ring-1 ring-white/10">
<span class="material-symbols-outlined text-[40px]" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</button>
<div class="flex items-center gap-6">
<button class="hover:scale-110 transition-transform gold-icon">
<span class="material-symbols-outlined text-[32px]">skip_next</span>
</button>
<button class="hover:opacity-80 transition-opacity gold-icon">
<span class="material-symbols-outlined text-[24px]">repeat</span>
</button>
</div>
</div>
</div>
</div>
<!-- Decorative Pattern Overlay (Subtle) -->
<div class="absolute right-0 top-0 h-full w-1/3 opacity-20 pointer-events-none mix-blend-overlay">
<svg class="h-full w-full" preserveaspectratio="none" viewbox="0 0 100 100">
<path d="M0,0 Q50,50 100,0 T200,0" fill="none" stroke="#FFD700" stroke-width="0.5"></path>
<path d="M0,20 Q50,70 100,20 T200,20" fill="none" stroke="#FFD700" stroke-width="0.5"></path>
<path d="M0,40 Q50,90 100,40 T200,40" fill="none" stroke="#FFD700" stroke-width="0.5"></path>
</svg>
</div>
</div>
</body></html>
