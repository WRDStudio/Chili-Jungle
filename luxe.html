<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&amp;family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&amp;family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<title>LUXE Compact Player</title>
<script id="tailwind-config">tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface": "#F5F5DC",
                        "primary": "#F5F5DC",
                        "background": "#050505",
                        "surface": "#0A0A0A",
                        "surface-container": "#121212",
                        "outline": "#F5F5DC"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Archivo Black", "sans-serif"],
                        "serif": ["Fraunces", "serif"],
                        "body": ["Plus Jakarta Sans", "sans-serif"]
                    }
                },
            },
        }</script>
<style>body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-archivo { font-family: 'Archivo Black', sans-serif; }
        .font-fraunces { font-family: 'Fraunces', serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .luxe-gradient {
            background: linear-gradient(135deg, #F5F5DC 0%, #E1E1C8 100%);
        }
        .shiny-cream {
            color: #F5F5DC;
            text-shadow: 0 0 20px rgba(245, 245, 220, 0.4);
        }
        .ivory-border {
            border: 1px solid rgba(245, 245, 220, 0.25);
        }
        .premium-texture {
            background-color: #0A0A0A;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(20, 20, 20, 0.8) 0%, rgba(5, 5, 5, 1) 100%),
                url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23F5F5DC' fill-opacity='0.03' fill-rule='evenodd'%3E%3Cpath d='M0 40L40 0H20L0 20M40 40V20L20 40'/%3E%3C/g%3E%3C/svg%3E");
            background-attachment: fixed;
        }
        .glass-overlay {
            background: linear-gradient(180deg, rgba(245, 245, 220, 0.03) 0%, rgba(0, 0, 0, 0) 100%);
        }
        .gold-glow:hover {
            text-shadow: 0 0 10px rgba(245, 245, 220, 0.6), 0 0 20px rgba(245, 245, 220, 0.2);
            color: #F5F5DC !important;
            opacity: 1 !important;
        }
        .active-gold {
            text-shadow: 0 0 8px rgba(245, 245, 220, 0.4);
            color: #F5F5DC !important;
            opacity: 0.9 !important;
        }</style>
</head>
<body class="bg-[#050505] text-[#F5F5DC] min-h-screen flex items-center justify-center p-6">
<!-- LUXE COMPACT PLAYER -->
<main class="w-full max-w-5xl">
<section class="rounded-[2.5rem] overflow-hidden relative shadow-[0_40px_100px_rgba(0,0,0,0.9)] premium-texture ivory-border">
<div class="absolute inset-0 glass-overlay pointer-events-none"></div>
<div class="relative z-10 p-6 md:p-8 flex flex-col md:flex-row items-center gap-8 md:gap-12">
<!-- 1. Cover Art -->
<div class="relative w-48 h-48 md:w-56 md:h-56 shrink-0 group">
<div class="absolute inset-0 luxe-gradient opacity-10 blur-2xl group-hover:opacity-30 transition-opacity duration-700"></div>
<div class="relative w-full h-full rounded-2xl overflow-hidden shadow-2xl border border-[#F5F5DC]/20">
<img alt="Ritual Nocturno Cover" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCB5xoRwsAFYWmVT5RE1BKhKEMpk7AxYCLzty0qzanRHCx_odASoHtCZbiCosuRf4AEosgHNDEiNyQGI5BJmtTI382sOzyFuvFZVy81Ig8BPrjmd0nrdJIKEP_7f5agVPHDgMbuHnuyHFr3TBGkQicB42bqJl-RUZoWJyea9YakNbTSg-ZLtI7xcPDVixibAwv9QtaJcaSzSwffBMmITZGcxoxmHmFFVPwlA_LhJPyC0GSnrNDBjmGO-u2Rqf8hOP6ioDVSXRE-uxsC"/>
</div>
</div>
<!-- 2. Content & Controls Wrapper -->
<div class="flex-1 w-full space-y-6 md:space-y-8">
<!-- Title & Artist -->
<div class="flex flex-col md:flex-row justify-between items-baseline gap-2">
<div>
<h1 class="font-archivo text-3xl md:text-5xl shiny-cream tracking-tighter leading-none mb-1">Ritual Nocturno</h1>
<p class="font-fraunces italic text-[#F5F5DC] opacity-80 text-lg">Jungle Studio • Midnight Series</p>
</div>
<div class="flex gap-4">
<button class="text-[#F5F5DC] hover:opacity-100 opacity-60 transition-all">
<span class="material-symbols-outlined !text-2xl">favorite</span>
</button>
<button class="text-[#F5F5DC] hover:opacity-100 opacity-60 transition-all">
<span class="material-symbols-outlined !text-2xl">more_horiz</span>
</button>
</div>
</div>
<!-- Progress Section -->
<div class="space-y-3">
<div class="relative h-1 w-full bg-[#F5F5DC]/10 rounded-full overflow-hidden">
<div class="absolute top-0 left-0 h-full w-[65%] luxe-gradient shadow-[0_0_15px_rgba(245,245,220,0.5)]"></div>
</div>
<div class="flex justify-between text-[11px] font-bold tracking-[0.2em] text-[#F5F5DC]">
<span>02:45</span>
<span>04:12</span>
</div>
</div>
<!-- Playback Controls -->
<div class="flex items-center justify-between">
<!-- Left Group -->
<div class="flex items-center gap-6">
<button class="text-[#F5F5DC] hover:opacity-100 opacity-60 transition-all gold-glow">
<span class="material-symbols-outlined !text-2xl">shuffle</span>
</button>
<button class="text-[#F5F5DC] hover:opacity-100 opacity-60 transition-all gold-glow">
<span class="material-symbols-outlined !text-2xl">repeat</span>
</button>
</div>
<!-- Main Controls -->
<div class="flex items-center gap-6 md:gap-10">
<button class="text-[#F5F5DC] hover:scale-110 transition-all active:scale-90 gold-glow active-gold">
<span class="material-symbols-outlined !text-3xl">skip_previous</span>
</button>
<button class="text-[#F5F5DC] hover:scale-110 transition-all active:scale-90 gold-glow active-gold">
<span class="material-symbols-outlined !text-4xl" style="font-variation-settings: 'FILL' 1;">pause</span>
</button>
<button class="text-[#F5F5DC] hover:scale-110 transition-all active:scale-90 gold-glow active-gold">
<span class="material-symbols-outlined !text-3xl">skip_next</span>
</button>
</div>
<!-- Right Group -->
<div class="flex items-center gap-6">
<button class="text-[#F5F5DC] hover:opacity-100 opacity-60 transition-all">
<span class="material-symbols-outlined !text-2xl">volume_up</span>
</button>
<button class="text-[#F5F5DC] hover:opacity-100 opacity-60 transition-all">
<span class="material-symbols-outlined !text-2xl">devices</span>
</button>
</div>
</div>
</div>
</div>
</section>
</main>
</body></html>
