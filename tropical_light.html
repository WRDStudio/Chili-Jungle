<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&amp;family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&amp;family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                "ivory": "#FCF9F0",
                "jungle-green": "#1A3C34",
                "primary": "#1A3C34",
                "background": "#FCF9F0",
                "on-surface": "#1A3C34"
            },
            "borderRadius": {
                "DEFAULT": "0.25rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "2xl": "1rem",
                "3xl": "1.5rem",
                "4xl": "2.5rem",
                "full": "9999px"
            },
            "fontFamily": {
                "headline": ["Plus Jakarta Sans"],
                "body": ["Plus Jakarta Sans"],
                "label": ["Plus Jakarta Sans"],
                "display": ["Archivo Black"],
                "serif": ["Fraunces"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #FCF9F0; 
        }
    </style>
</head>
<body class="font-body selection:bg-primary/30 min-h-screen flex items-center justify-center p-6 text-jungle-green">
<main class="w-full max-w-5xl">
<!-- COMPACT HORIZONTAL PLAYER CARD -->
<div class="relative overflow-hidden rounded-4xl shadow-2xl flex flex-col md:flex-row items-stretch min-h-[280px] bg-white/80 border border-jungle-green/10">
<!-- Background Image Layer -->
<div class="absolute inset-0 z-0"><img alt="Tropical Jungle" class="w-full h-full object-cover opacity-10 mix-blend-multiply" src="https://lh3.googleusercontent.com/aida-public/AB6AXuANBPDRQXrm6j0tFKIMMcEpDiSVHQ0XgVUfteB_3txTXNwO2BOkmzG1fq_4FLUh7EFtOsQphYhjVJRfe7MGUQA7G2T0mS52myU0G8dhGnKEPoXOGK8vSoOvP5CKwI_-4mWiTQG_jKXi-jZjD-ifN5oeVLTrJlTtOzpWbQGTwLBJRa19f1dS89MbDGv1AV1JAdCJattlYmMvIx8YvdRJx8fQpDg86yTB4BhxUm6gYSO5LDhlNFaxgQX8V7ZjgiH0K8rg7dXF-9PWj8FE"/><div class="absolute inset-0 bg-gradient-to-r from-white via-white/80 to-transparent"></div></div>
<!-- Content Container -->
<div class="relative z-10 flex flex-col md:flex-row items-center w-full p-8 md:p-10 gap-8 md:gap-12">
<!-- 1. Cover Art Shell -->
<div class="relative w-48 h-48 flex-shrink-0">
<div class="absolute inset-0 bg-tropical-yellow rotate-3 rounded-3xl opacity-20"></div>
<div class="absolute inset-0 bg-black/40 -rotate-2 rounded-3xl backdrop-blur-sm"></div>
<img alt="Brisa de Selva Cover Art" class="relative z-10 w-full h-full object-cover rounded-3xl shadow-2xl border border-white/5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuALAwCM74Pq8jXv4wOfNmX_dYxMKce-nRAakVCQZ_H-wkF6a5HrbdJKjZ2KQFz-CMal4nZQo8-9yQGA7qspB6vugDrgbc9FrnyWPDwcVRMRWoyUe-iCWLrtUFy0PODvGN0LxI-QoeXaJ6DT308eoKDBbTjPO4MSZ97XqX_dvTg99i5T5hoUUWDHHfgl-6uICy3NN3SPnxQA-cRER7MX9nzwdSEQ8FZ-NizLufE-yXboaPe1fBsedIjEt-S1tVwjVJy8M1vPTfNhHyNh"/>
</div>
<!-- 2. Info & Controls Area -->
<div class="flex-1 flex flex-col justify-center w-full">
<!-- Metadata -->
<div class="mb-6 text-center md:text-left">
<span class="font-serif italic text-lg block mb-1 text-jungle-green/60">Ritual en curso</span>
<h2 class="font-display text-4xl md:text-5xl leading-none uppercase tracking-tighter text-jungle-green">Brisa de Selva</h2>
<div class="flex items-center justify-center md:justify-start gap-3 mt-2">
<span class="font-medium text-sm tracking-widest uppercase text-jungle-green/60">Ritmo del Sol</span>
<span class="w-1 h-1 rounded-full bg-jungle-green/20"></span>
<span class="font-medium text-xs tracking-[0.2em] uppercase text-jungle-green/40">2024</span>
</div>
</div>
<!-- Player Controls Wrapper -->
<div class="w-full max-w-xl">
<!-- Progress Bar -->
<div class="group relative w-full h-1.5 mb-8 rounded-full cursor-pointer bg-jungle-green/10">
<div class="absolute left-0 top-0 h-full w-[42%] bg-tropical-yellow shadow-[0_0_15px_rgba(241,179,53,0.6)] rounded-full bg-jungle-green shadow-[0_0_15px_rgba(26,60,52,0.3)]"></div>
<div class="absolute left-[42%] top-1/2 -translate-y-1/2 w-4 h-4 bg-jungle-green rounded-full scale-0 group-hover:scale-100 transition-transform shadow-lg border-2 border-white"></div>
<div class="absolute -bottom-6 left-0 text-[10px] font-bold tracking-tighter text-jungle-green/40">01:42</div>
<div class="absolute -bottom-6 right-0 text-[10px] font-bold tracking-tighter text-jungle-green/40">04:15</div>
</div>
<!-- Buttons Row -->
<div class="flex items-center justify-between gap-4">
<div class="flex items-center gap-6">
<button class="hover:text-tropical-yellow transition-colors text-jungle-green/40"><span class="material-symbols-outlined text-[24px]">shuffle</span></button>
<button class="transition-all hover:scale-110 active:scale-90 text-jungle-green/80 hover:text-jungle-green"><span class="material-symbols-outlined text-[32px]">skip_previous</span></button>
</div>
<button class="w-20 h-20 rounded-full bg-jungle-green text-white flex items-center justify-center shadow-[0_8px_25px_rgba(26,60,52,0.3)] hover:scale-105 active:scale-95 transition-all group">
<span class="material-symbols-outlined text-[48px] translate-x-0.5" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</button>
<div class="flex items-center gap-6">
<button class="transition-all hover:scale-110 active:scale-90 text-jungle-green/80 hover:text-jungle-green"><span class="material-symbols-outlined text-[32px]">skip_next</span></button>
<button class="hover:text-tropical-yellow transition-colors text-jungle-green/40"><span class="material-symbols-outlined text-[24px]">repeat</span></button>
</div>
</div>
</div>
</div>
<!-- 3. Desktop Side Actions -->
<div class="hidden xl:flex flex-col items-center justify-center gap-8 border-l pl-12 h-40 border-jungle-green/10">
<button class="transition-colors text-jungle-green/40 text-jungle-green/80"><span class="material-symbols-outlined">favorite</span></button>
<button class="transition-colors text-jungle-green/40 text-jungle-green/80"><span class="material-symbols-outlined">queue_music</span></button>
<button class="transition-colors text-jungle-green/40 text-jungle-green/80"><span class="material-symbols-outlined">share</span></button>
</div>
</div>
</div>
<!-- Subtle Footer Branding -->
<div class="mt-8 flex justify-between items-center px-4 opacity-30">
<div class="text-xs font-black tracking-tighter uppercase text-jungle-green">The Sonic Curator</div>
<div class="text-[10px] uppercase tracking-[0.3em] text-jungle-green/60">Premium Tropical Ritual</div>
</div>
</main>
</body></html>
